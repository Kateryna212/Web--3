<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Click — Магазин електроніки</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo">Easy Click</div>
        <nav>
            <ul>
                <li><a href="#">Каталог</a></li>
                <li><a href="#">Акції</a></li>
                <li><a href="#">Кошик</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Знижки до -30% на смартфони</h1>
            <p>Тільки цього тижня в Easy Click!</p>
            <button>Переглянути</button>
        </section>

        <section class="products">
            <h2>Хіти продажу</h2>
            <div class="product-grid">
                <article class="card">
                    <div class="card-img">IMG</div>
                    <h3>iPhone 15</h3>
                    <p class="price">35 000 грн</p>
                    <button class="buy-btn">В кошик</button>
                </article>
                <article class="card">
                    <div class="card-img">IMG</div>
                    <h3>MacBook Air</h3>
                    <p class="price">45 000 грн</p>
                    <button class="buy-btn">В кошик</button>
                </article>
                <article class="card">
                    <div class="card-img">IMG</div>
                    <h3>AirPods Pro</h3>
                    <p class="price">9 500 грн</p>
                    <button class="buy-btn">В кошик</button>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Easy Click. Всі права захищені.</p>
    </footer>

</body>
</html>
